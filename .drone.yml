---
kind: pipeline
name: drone-autoscaler
type: docker

trigger:
  event:
    - custom

platform:
  os: linux
  arch: arm64

node:
  type: arm-2x-dp

steps:
- name: wait-for-sandbox
  image: artifactory-rd.netskope.io/dockerhub/docker
  commands:
    - chmod +x scripts/waitForSandbox.sh
    - ./scripts/waitForSandbox.sh
  volumes:
    - name: sandbox-docker-sock
      path: /var/run

- name: test
  pull: default
  image: golang
  volumes:
  - name: deps
    path: /go
  commands:
  - go get
  - go test -v -cover ./...

- name: test_postgres
  pull: default
  image: golang
  volumes:
  - name: deps
    path: /go
  commands:
  - cd store
  - go test -v
  environment:
    DATABASE_CONFIG: host=postgres user=postgres password=password dbname=test sslmode=disable
    DATABASE_DRIVER: postgres

- name: test_mysql
  pull: default
  image: golang
  volumes:
  - name: deps
    path: /go
  commands:
  - cd store
  - go test -v
  environment:
    DATABASE_CONFIG: "root:password@tcp(mysql:3306)/test?parseTime=true"
    DATABASE_DRIVER: mysql

- name: build
  pull: default
  image: golang
  volumes:
  - name: deps
    path: /go
  commands:
  - sh .drone.sh

- name: build-and-push-multiarch
  image: artifactory-rd.netskope.io/dockerhub/docker
  environment:
    TAG: $(cat /tmp/ep-version-artifactory-docker)
    ARTIFACTORY_PASSWORD:
      from_secret: global_artifactory_password
    ARTIFACTORY_USER: $${NS_ARTIFACTORY_USER}
  commands:
    # Login to Artifactory
    - echo $${ARTIFACTORY_PASSWORD} | docker login -u $${ARTIFACTORY_USER} --password-stdin artifactory-rd.netskope.io
    # Setup buildx
    - docker buildx create --use --name multiarch-builder || true
    - docker buildx inspect --bootstrap
    # Build and push multi-arch image (version tag only)
    - docker buildx build --platform linux/amd64,linux/arm64 -t artifactory-rd.netskope.io/docker-playground/drone-autoscaler:$(eval echo $TAG) --push -f Dockerfile .
  volumes:
    - name: sandbox-docker-sock
      path: /var/run
    - name: ep-version
      path: /tmp

- name: get version
  image: artifactory-rd.netskope.io/org-base-release-docker/ns-ep/git-alpine-current:24.84.259
  commands:
    # - SCRIPT_DIR=$DRONE_WORKSPACE/scripts
    # - chmod 755 $SCRIPT_DIR/get_version.sh
    # - VERSION=$($SCRIPT_DIR/get_version.sh)
    # - echo $VERSION > /tmp/ep-version-artifactory-docker
    - echo "multi-arch" > /tmp/ep-version-artifactory-docker
  volumes:
    - name: ep-version
      path: /tmp


services:
  - name: mysql
    pull: default
    image: mysql:5
    environment:
      MYSQL_DATABASE: test
      MYSQL_ROOT_PASSWORD: password
  - name: postgres
    pull: default
    image: postgres:9
    environment:
      POSTGRES_DB: test
      POSTGRES_PASSWORD: password
  - name: docker-sandbox
    image: artifactory-rd.netskope.io/drone-plugins/docker-dind:25.92.11
    privileged: true
    volumes:
      - name: sandbox-docker-sock
        path: /var/run

volumes:
  - name: deps
    temp: {}
  - name: sandbox-docker-sock
    temp: {}
  - name: ep-version
    host:
      path: /tmp