---
kind: pipeline
name: drone-autoscaler
type: docker

trigger:
  event:
    - custom

steps:
- name: wait-for-sandbox
  image: artifactory-rd.netskope.io/dockerhub/docker
  commands:
    - chmod +x scripts/waitForSandbox.sh
    - ./scripts/waitForSandbox.sh
  volumes:
    - name: sandbox-docker-sock
      path: /var/run

- name: test
  pull: default
  image: golang
  volumes:
  - name: deps
    path: /go
  commands:
  - go get
  - go test -v -cover ./...

- name: test_postgres
  pull: default
  image: golang
  volumes:
  - name: deps
    path: /go
  commands:
  - cd store
  - go test -v
  environment:
    DATABASE_CONFIG: host=postgres user=postgres password=password dbname=test sslmode=disable
    DATABASE_DRIVER: postgres

- name: test_mysql
  pull: default
  image: golang
  volumes:
  - name: deps
    path: /go
  commands:
  - cd store
  - go test -v
  environment:
    DATABASE_CONFIG: "root:password@tcp(mysql:3306)/test?parseTime=true"
    DATABASE_DRIVER: mysql

- name: build
  pull: default
  image: golang
  volumes:
  - name: deps
    path: /go
  commands:
  - sh .drone.sh

- name: build-autoscaler
  image: artifactory-rd.netskope.io/dockerhub/docker
  commands:
    - docker build -t drone-autoscaler -f Dockerfile .
  volumes:
    - name: sandbox-docker-sock
      path: /var/run

- name: get version
  image: artifactory-rd.netskope.io/org-base-release-docker/ns-ep/git-alpine-current:24.84.259
  commands:
    # - SCRIPT_DIR=$DRONE_WORKSPACE/scripts
    # - chmod 755 $SCRIPT_DIR/get_version.sh
    # - VERSION=$($SCRIPT_DIR/get_version.sh)
    # - echo $VERSION > /tmp/ep-version-artifactory-docker
    - echo "1.0.0" > /tmp/ep-version-artifactory-docker
  volumes:
    - name: ep-version
      path: /tmp

- name: publish
  image: artifactory-rd.netskope.io/drone-plugins/artifactory-docker:latest
  environment:
    TAG: $(cat /tmp/ep-version-artifactory-docker)
  settings:
    url:
      from_secret: global_artifactory_url
    user: $${NS_ARTIFACTORY_USER}
    password:
      from_secret: global_artifactory_password
    build_name: drone-autoscaler
    target_repo: docker-playground
    artifactory: $NS_ARTIFACTORY_HOST
    latest_tag: true
    images: drone-autoscaler
    tag: $(eval echo $TAG)
  volumes:
    - name: ep-version
      path: /tmp
    - name: sandbox-docker-sock
      path: /var/run

services:
  - name: mysql
    pull: default
    image: mysql:5
    environment:
      MYSQL_DATABASE: test
      MYSQL_ROOT_PASSWORD: password
  - name: postgres
    pull: default
    image: postgres:9
    environment:
      POSTGRES_DB: test
      POSTGRES_PASSWORD: password
  - name: docker-sandbox
    image: artifactory-rd.netskope.io/drone-plugins/docker-dind
    privileged: true
    volumes:
      - name: sandbox-docker-sock
        path: /var/run

volumes:
  - name: deps
    temp: {}
  - name: sandbox-docker-sock
    temp: {}
  - name: ep-version
    host:
      path: /tmp